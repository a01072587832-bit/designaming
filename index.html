<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면 전환 예제</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
        .screen { width: 100%; height: 100vh; background-size: cover; background-position: center; position: absolute; top: 0; left: 0; display: flex; justify-content: center; align-items: center; }

        /* 초기 레이어 설정 */
        #page1 { background-image: url('표지.png'); z-index: 100; cursor: pointer; transition: opacity 1s ease-out; }
        #page2 { background-image: url('지도.png'); z-index: 10; display: none; }
        #page3 { z-index: 5; display: none; }
        #page4 { z-index: 1; display: none; }

        /* 페이드 효과 클래스 */
        .fade-out { opacity: 0 !important; pointer-events: none; }
        .fade-out-effect { opacity: 0 !important; transition: opacity 0.4s ease-out; pointer-events: none; }

        .building-btn { position: absolute; background-color: rgba(0, 0, 0, 0); cursor: pointer; z-index: 20; }
        
        @keyframes floating {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }
        .retro-float { animation: floating 1.5s steps(3) infinite; position: absolute; z-index: 100; pointer-events: none; }

        /* 건물 좌표 */
        #btn-K { top: 33%; left: 13%; width: 5%; height: 32%; }
        #btn-R { top: 68%; left: 13%; width: 23%; height: 13%; }
        #btn-L { top: 22%; left: 17%; width: 7%; height: 10%; }
        #btn-H { top: 18%; left: 28%; width: 8%; height: 6%; }
        #btn-G { top: 28%; left: 26%; width: 14%; height: 9%; }
        #btn-Q { top: 18%; left: 40%; width: 7%; height: 11%; }
        #btn-F { top: 16%; left: 48%; width: 4%; height: 13%; }
        #btn-MH { top: 33%; left: 45%; width: 11%; height: 7%; }
        #btn-E { top: 22%; left: 55%; width: 10%; height: 8%; }
        #btn-B { top: 21%; left: 66%; width: 5%; height: 11%; }
        #btn-A { top: 31%; left: 72%; width: 9%; height: 7%; }
        #btn-C { top: 15%; left: 72%; width: 15%; height: 15%; }
    </style>
</head>
<body>

    <div id="page1" class="screen" onclick="showNextPage()"></div>

    <div id="page2" class="screen">
        <img src="뒤로가기.png" onclick="location.reload()" style="position: fixed; top: 26px; left: 48px; width: 60px; z-index: 9999; cursor: pointer;">
        <img id="map-text" src="두번째 글자.png" class="retro-float" style="top: 43%; left: 40%; width: 800px; transform: translate(-50%, -50%);">
        <!-- 각 건물 버튼들 -->
        <div id="btn-K" class="building-btn" onclick="goToThirdPage('K')"></div>
        <div id="btn-R" class="building-btn" onclick="goToThirdPage('R')"></div>
        <div id="btn-L" class="building-btn" onclick="goToThirdPage('L')"></div>
        <div id="btn-H" class="building-btn" onclick="goToThirdPage('H')"></div>
        <div id="btn-G" class="building-btn" onclick="goToThirdPage('G')"></div>
        <div id="btn-Q" class="building-btn" onclick="goToThirdPage('Q')"></div>
        <div id="btn-F" class="building-btn" onclick="goToThirdPage('F')"></div>
        <div id="btn-MH" class="building-btn" onclick="goToThirdPage('MH')"></div>
        <div id="btn-E" class="building-btn" onclick="goToThirdPage('E')"></div>
        <div id="btn-B" class="building-btn" onclick="goToThirdPage('B')"></div>
        <div id="btn-A" class="building-btn" onclick="goToThirdPage('A')"></div>
        <div id="btn-C" class="building-btn" onclick="goToThirdPage('C')"></div>
    </div>

    <div id="page3" class="screen">
        <img src="뒤로가기.png" onclick="goBackToMap()" style="position: fixed; top: 26px; left: 48px; width: 60px; z-index: 9999; cursor: pointer;">
        <img id="common-text" src="클릭히어.png" class="retro-float" style="top: 5%; width: 650px; display: none;">  
        <img id="second-text" src="아래로.png" class="retro-float" style="top: 32%; width: 380px; display: none;"> 
        <div id="arrow-link" onclick="goToFourthPage()" 
             style="position: absolute; top: 63%; left: 48.5%; width: 5%; height: 6%; cursor: pointer; background-color: rgba(0, 0, 0, 0); z-index: 1000;">
        </div>
    </div>

    <div id="page4" class="screen">
        <img src="뒤로가기.png" onclick="goBackToThirdPage()" style="position: fixed; top: 26px; left: 48px; width: 60px; z-index: 9999; cursor: pointer;">
    </div>

    <script>
        let currentBuildingName = ""; 

        function showNextPage() {
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');
            page2.style.display = 'flex'; 
            page1.classList.add('fade-out');
            setTimeout(() => { page1.style.display = 'none'; }, 1000);
        }

        function goToThirdPage(buildingName) {
            currentBuildingName = buildingName;
            const page2 = document.getElementById('page2');
            const page3 = document.getElementById('page3');

            // 4페이지 이미지 미리 로딩 (하얀 화면 방지)
            const imgPreload = new Image();
            imgPreload.src = `${buildingName}_detail.png`;

            page3.style.backgroundImage = `url('${buildingName}.png')`;
            document.getElementById('map-text').style.display = 'none';
            document.getElementById('common-text').style.display = 'block';
            document.getElementById('second-text').style.display = 'block';
            
            // 애니메이션 로직: 3페이지를 아래에 깔고 2페이지를 서서히 지움
            page3.style.display = 'flex';
            page3.style.zIndex = '5';
            page2.style.zIndex = '10'; 
            page2.classList.add('fade-out-effect');

            setTimeout(() => { 
                page2.style.display = 'none'; 
                page2.classList.remove('fade-out-effect'); 
                page3.style.zIndex = '30'; // 완료 후 3페이지를 최상단으로
            }, 400);
        }

        function goBackToMap() {
            const page2 = document.getElementById('page2');
            const page3 = document.getElementById('page3');
            page3.style.display = 'none';
            page2.style.display = 'flex';
            page2.style.opacity = '1';
            page2.style.zIndex = '50';
            document.getElementById('map-text').style.display = 'block';
        }

        function goToFourthPage() {
            const page3 = document.getElementById('page3');
            const page4 = document.getElementById('page4');
            
            page4.style.backgroundImage = `url('${currentBuildingName}_detail.png')`;
            page4.style.display = 'flex';
            page4.style.zIndex = '60'; // 4페이지가 가장 위로
            page3.classList.add('fade-out-effect');

            setTimeout(() => { 
                page3.style.display = 'none'; 
                page3.classList.remove('fade-out-effect'); 
            }, 400);
        }

        function goBackToThirdPage() {
            document.getElementById('page4').style.display = 'none';
            document.getElementById('page3').style.display = 'flex';
            document.getElementById('page3').style.zIndex = '70';
        }
    </script>
</body>
</html>
